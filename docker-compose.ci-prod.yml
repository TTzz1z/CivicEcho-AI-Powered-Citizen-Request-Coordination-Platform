# CI-only override for production-compose job.
# 1) Keep postgres/minio healthy deps (compose replaces depends_on wholesale).
# 2) ClamAV signature download is slow — wait with service_started, then poll in workflow.
services:
  backend:
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_started
  caddy:
    # Avoid privileged 80/443 contention on shared CI runners.
    ports: !override
      - "8088:80"
