version: "3.0"

nlu:
- intent: submit_complaint
  examples: |
    - [青松小区](location)电梯坏了五天，物业每次都说马上修，到现在还是不能用
    - [松涛路](location)雨后积水一直没排，行人只能走到机动车道上
    - 垃圾清运车凌晨四点作业，连续一个星期把全家吵醒
    - 去窗口交材料，工作人员让我在三个楼层来回跑，最后还说系统下班了
    - [云河小学](location)门口每天放学都被接送车辆堵死，也没有人疏导
    - 我家楼下餐饮店油烟直往卧室灌，反映几次都没人管
    - [北辰医院](location)挂号机坏了一排，现场窗口却只开了一个
    - 这趟公交连续两站不停，司机看到有人招手也直接开走了
    - [桂花巷](location)的路灯半个月没亮，晚上老人差点摔倒
    - 物业把公共绿地改成停车位，业主问了也不给解释
    - [小区东门](location)垃圾桶满了以后又堆了两天，气味特别大
    - 社区活动室写着全天开放，去了三次门都是锁的
    - 昨天办医保转移，窗口收了材料后又说全部要重交
    - [星湖公园](location)儿童滑梯螺丝松脱，提醒管理人员后仍未封闭
    - 楼上装修从早到晚不停，周末也施工，物业电话一直打不通
    - 学校临时收取一笔费用，家长问用途却没有公开说明
    - 医院报告查询系统反复报错，排队找人工也没有工作人员
    - [我家门口](location)的人行道被商户长期占满，婴儿车完全过不去
    - 村口道路挖开后一个月没恢复，下雨全是泥
    - 公交站电子屏显示的到站时间一直不准，已经耽误好几次换乘
    - [锦程社区](location)通知停水两小时，结果整整一天还没恢复
    - 服务大厅预约了十点，到十二点窗口仍然没有叫号
    - 菜市场污水直接排到路面，晴天也到处积着脏水
    - [学校旁边](location)工地夜间施工，最近孩子每天都睡不好
    - 急诊缴费窗口态度很差，询问流程时还让患者自己去找
    - 道路刚铺完不到一周又被开挖，反复施工没人说明
    - 小区消防门被锁死，向物业反映后只贴了张通知
    - [南溪村](location)垃圾收集点很久不消毒，苍蝇到处都是
    - 医保热线连续几天占线，接通后又被直接挂断
    - [翠竹路与新安街交叉口](location)信号灯配时混乱，早高峰车辆堵成一团

- intent: submit_suggestion
  examples: |
    - 建议在[云河区政务中心](location)设置材料预审窗口，减少来回补件
    - [青松小区](location)老人多，希望增设几处带靠背的休息椅
    - 公交晚班间隔太长，可以根据客流适当增加班次
    - 希望医院预约页面提供语音朗读和大字模式
    - 学校门口最好划出即停即走区域，别让车辆长时间停着
    - 能不能把各项补贴的申请条件做成一张对比表
    - 建议[星湖公园](location)儿童区增加遮阳和饮水设施
    - 社区可以定期为独居老人提供上门安全检查
    - 希望地铁站无障碍电梯故障时能及时推送通知
    - 办事进度如果有变化，最好主动发短信告诉申请人
    - 建议农村客运增加赶集日的临时班次
    - [松涛路](location)可以补画非机动车道并清理长期占道车辆
    - 希望图书馆周末闭馆时间延后一个小时
    - 医院停车场入口可以显示各楼层剩余车位
    - 建议学校食堂每月公开一次食品抽检结果
    - 社区服务中心能否保留一个午休时段值班窗口
    - 公园健身区最好增加适合残障人士使用的器材
    - 可以在[小区北门](location)设置快递集中柜，减少车辆进出
    - 希望公交站牌同时标注首末班车和无障碍线路
    - 建议窗口把常见退件原因提前写进办理指南
    - [北辰医院](location)可否增加检查科室之间的地面引导线
    - 社区暑期可以开放教室给孩子做作业
    - 建议在积水多发路段加装水位提示牌
    - 希望物业维修记录能让业主在线查看
    - 学校周边可以增加护学岗和临时停车提示
    - 办老年证时可否同时提供公交优惠开通服务
    - 建议村卫生室增加常用慢病药品的储备
    - [翠竹广场](location)晚上人多，希望多放几个分类垃圾桶
    - 公共厕所可以增加低位洗手台，方便儿童使用
    - 希望政策调整后能同时发布通俗版说明和办理示例

- intent: policy_consultation
  examples: |
    - 外地户口申请本市公租房需要连续缴纳多久社保
    - 居民医保暂停后重新参保要从哪个入口办理
    - 企业注册地址变更需要先办税务还是先换营业执照
    - 新生入学网上报名错过一天还能补报吗
    - 办理残疾人乘车优惠需要本人到现场吗
    - 灵活就业社保断缴三个月会影响退休待遇吗
    - 在[云河区](location)补办身份证可以跨街道预约吗
    - 申请临时救助要提交家庭成员的哪些证明
    - 房屋租赁备案的合同必须使用统一模板吗
    - 老人去世后医保个人账户余额如何处理
    - 个体户没有经营了，线上注销具体分几步
    - 异地生育费用回来报销有没有时间限制
    - 公积金贷款提前还款需要支付违约金吗
    - 孩子从民办学校转到公办学校要符合什么条件
    - 办理门诊慢病认定是去医院还是医保窗口
    - [北辰医院](location)开的电子票据能用于手工报销吗
    - 失业金领取期间找到临时工作要不要停止申领
    - 宅基地上的老房翻建需要经过哪些审批
    - 公司给新员工补缴社保可以追溯几个月
    - 申请法律援助时家庭收入怎么核定
    - 护照还有半年到期，现在能提前换发吗
    - 夫妻投靠迁户口需要结婚满几年
    - 老年人高龄津贴是自动发放还是每年认证
    - 道路占用施工许可证能在网上查看审批进度吗
    - 企业开办后刻章费用现在是否还有补贴
    - 生育登记可以由配偶在异地代办吗
    - 农村低收入家庭申请助学金需要村里盖章吗
    - [政务大厅](location)周日可以领取已经办好的证件吗
    - 退休人员更换手机号后怎样重新做待遇认证
    - 不动产证上增加配偶姓名需要缴哪些税费

- intent: request_help
  examples: |
    - 老人瘫痪在床，身份证到期了，能不能协调上门采集照片
    - 我在[云河客运站](location)钱包和手机都丢了，现在联系不上家人
    - 孩子放学后一直没回家，请帮忙联系附近工作人员寻找
    - 家中轮椅突然坏了，老人明早要去医院，能帮忙协调车辆吗
    - 暴雨进屋以后没地方住，家里还有两个小孩，请问哪里能临时安置
    - 我看不清自助机，也没有家属陪同，现场能安排人帮我操作吗
    - [青松小区](location)电梯停了，病人需要下楼做透析，麻烦尽快协调
    - 母亲只会说家乡话，办理救助时听不懂材料要求，能否有人陪同
    - 工资拖欠半年，老板已经联系不上了，请帮我找到受理部门
    - 我在外地，独居父亲两天没接电话，想请社区上门看看
    - 临时身份证还没拿到，明天就要参加考试，能帮忙开证明吗
    - 家里燃气被停了，老人不会操作阀门，请安排人员看看
    - [学校门口](location)孩子突然晕倒，家长还没赶到，请协助联系急救
    - 我不会写字，申请表一个人填不了，能不能找工作人员帮忙
    - 房东突然换锁，我的药和证件都在屋里，请帮忙协调处理
    - 老人走失时没带手机，已经找了几个小时，需要协助调取线索
    - 我坐轮椅到了大厅，但门口台阶上不去，能请人出来接一下吗
    - 家里断水三天，物业和房东互相推，我带着婴儿实在撑不住了
    - [南溪村](location)道路塌方，救护车进不来，家里病人急需就医
    - 我被网络诈骗后很慌，不知道证据怎么保存，请指导我先做什么
    - 孩子的转学手续卡住了，两边学校都让我找对方，能否帮助协调
    - 低保还没批下来，家里已经没有基本生活费，想申请临时援助
    - [我家附近](location)有位老人摔倒了，我一个人扶不起来
    - 视障人士第一次来办证，找不到窗口，能安排志愿者带一下吗
    - 医院要求马上缴费，但银行卡丢了，家属也不在身边，能否提供帮助
    - 家里老人疑似被骗着转账，电话一直占线，请告诉我怎么紧急止付
    - 我带孩子在外地看病，证件遗失后无法办理住院，麻烦协助
    - 楼道浓烟很大，行动不便的邻居还在屋里，请立即联系救援
    - [小区西门](location)路面积冰，老人摔伤后不能移动，需要帮助
    - 我一个人照护失能家属已经撑不住了，想请社区提供几天临时照料
