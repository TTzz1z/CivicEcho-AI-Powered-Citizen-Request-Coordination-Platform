name: tingting-assistant

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_UPSTREAM: "${FRONTEND_BACKEND_UPSTREAM:-http://backend:8000}"
      RASA_UPSTREAM: "${FRONTEND_RASA_UPSTREAM:-http://rasa:5005}"
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
      rasa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-tingting}"
      POSTGRES_USER: "${POSTGRES_USER:-tingting}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tingting} -d ${POSTGRES_DB:-tingting}"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-tingting}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tingting}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      JWT_ACCESS_TOKEN_MINUTES: "${JWT_ACCESS_TOKEN_MINUTES:-30}"
      APP_ENV: "${APP_ENV:-development}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}"
      MAX_REQUEST_BODY_BYTES: "${MAX_REQUEST_BODY_BYTES:-1048576}"
      DATABASE_CONNECT_TIMEOUT_SECONDS: "${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}"
      LOGIN_RATE_LIMIT_ATTEMPTS: "${LOGIN_RATE_LIMIT_ATTEMPTS:-5}"
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: "${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      SERVICE_API_TOKEN: "${SERVICE_API_TOKEN:?Set SERVICE_API_TOKEN in .env}"
      DEFAULT_TIMEZONE: "${DEFAULT_TIMEZONE:-Asia/Shanghai}"
      ATTACHMENT_MAX_BYTES: "${ATTACHMENT_MAX_BYTES:-20971520}"
      ATTACHMENT_IMAGE_MAX_BYTES: "${ATTACHMENT_IMAGE_MAX_BYTES:-10485760}"
      OBJECT_STORAGE_ENDPOINT: "${OBJECT_STORAGE_ENDPOINT:-minio:9000}"
      OBJECT_STORAGE_ACCESS_KEY: "${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}"
      OBJECT_STORAGE_SECRET_KEY: "${OBJECT_STORAGE_SECRET_KEY:-minioadmin}"
      OBJECT_STORAGE_BUCKET: "${OBJECT_STORAGE_BUCKET:-tingting-attachments}"
      OBJECT_STORAGE_SECURE: "${OBJECT_STORAGE_SECURE:-false}"
      MALWARE_SCAN_MODE: "${MALWARE_SCAN_MODE:-disabled}"
      MALWARE_SCAN_URL: "${MALWARE_SCAN_URL:-}"
      MALWARE_SCAN_TOKEN: "${MALWARE_SCAN_TOKEN:-}"
      MALWARE_SCAN_TIMEOUT_SECONDS: "${MALWARE_SCAN_TIMEOUT_SECONDS:-30}"
      MALWARE_SCAN_REQUIRE_CLEAN: "${MALWARE_SCAN_REQUIRE_CLEAN:-false}"
      AI_PROVIDER: "${AI_PROVIDER:-rules}"
      AI_MODEL_NAME: "${AI_MODEL_NAME:-phase6-rules-v1}"
      AI_API_KEY: "${AI_API_KEY:-}"
      AI_BASE_URL: "${AI_BASE_URL:-https://api.deepseek.com}"
      AI_MODEL: "${AI_MODEL:-deepseek-chat}"
      AI_TIMEOUT_SECONDS: "${AI_TIMEOUT_SECONDS:-30}"
      AI_MAX_TOKENS: "${AI_MAX_TOKENS:-1024}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-https://api.deepseek.com}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-v1}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-1024}"
      EMBEDDING_TIMEOUT_SECONDS: "${EMBEDDING_TIMEOUT_SECONDS:-30}"
      KB_CHUNK_SIZE: "${KB_CHUNK_SIZE:-500}"
      KB_CHUNK_OVERLAP: "${KB_CHUNK_OVERLAP:-100}"
      KB_RAG_TOP_K: "${KB_RAG_TOP_K:-5}"
      KB_UPLOAD_BUCKET: "${KB_UPLOAD_BUCKET:-tingting-kb}"
      RASA_WEBHOOK_URL: "${RASA_WEBHOOK_URL:-http://rasa:5005/webhooks/rest/webhook}"
      KB_ALLOW_DIRECT_PUBLISH: "${KB_ALLOW_DIRECT_PUBLISH:-true}"
      INTEGRATION_TIMEOUT_SECONDS: "${INTEGRATION_TIMEOUT_SECONDS:-10}"
      OIDC_ENABLED: "${OIDC_ENABLED:-false}"
      OIDC_ISSUER: "${OIDC_ISSUER:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_REDIRECT_URI: "${OIDC_REDIRECT_URI:-http://localhost:8080/auth/oidc/callback}"
      OIDC_SCOPES: "${OIDC_SCOPES:-openid profile email}"
      DIRECTORY_API_URL: "${DIRECTORY_API_URL:-}"
      DIRECTORY_API_TOKEN: "${DIRECTORY_API_TOKEN:-}"
      WORK_ORDER_PLATFORM: "${WORK_ORDER_PLATFORM:-disabled}"
      WORK_ORDER_API_URL: "${WORK_ORDER_API_URL:-}"
      WORK_ORDER_API_TOKEN: "${WORK_ORDER_API_TOKEN:-}"
      SMS_API_URL: "${SMS_API_URL:-}"
      SMS_API_TOKEN: "${SMS_API_TOKEN:-}"
      MAP_API_URL: "${MAP_API_URL:-}"
      MAP_API_TOKEN: "${MAP_API_TOKEN:-}"
      DIVISION_API_URL: "${DIVISION_API_URL:-}"
      DIVISION_API_TOKEN: "${DIVISION_API_TOKEN:-}"
      CENTRAL_LOG_ENDPOINT: "${CENTRAL_LOG_ENDPOINT:-}"
      CENTRAL_LOG_TOKEN: "${CENTRAL_LOG_TOKEN:-}"
      MONITORING_ENDPOINT: "${MONITORING_ENDPOINT:-}"
      MONITORING_TOKEN: "${MONITORING_TOKEN:-}"
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  duckling:
    image: rasa/duckling:0.2.0.2@sha256:19db902ea05d88b62c311ba0694623c562d6e28aea3f31b5e3b0d6c87f00bc21
    ports:
      - "${DUCKLING_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/8000"]
      interval: 10s
      timeout: 3s
      retries: 10

  action_server:
    build:
      context: .
      dockerfile: Dockerfile.actions
    environment:
      TICKET_BACKEND_MODE: "${TICKET_BACKEND_MODE:-http}"
      TICKET_SERVICE_URL: "${TICKET_SERVICE_URL:-http://backend:8000}"
      TICKET_SERVICE_TIMEOUT_SECONDS: "${TICKET_SERVICE_TIMEOUT_SECONDS:-5}"
      TICKET_SERVICE_TOKEN: "${SERVICE_API_TOKEN:?Set SERVICE_API_TOKEN in .env}"
      SERVICENOW_LOCAL_MODE: "${SERVICENOW_LOCAL_MODE:-true}"
      SERVICENOW_INSTANCE: "${SERVICENOW_INSTANCE:-}"
      SERVICENOW_USER: "${SERVICENOW_USER:-}"
      SERVICENOW_PASSWORD: "${SERVICENOW_PASSWORD:-}"
      SERVICENOW_TIMEOUT_SECONDS: "${SERVICENOW_TIMEOUT_SECONDS:-10}"
      HANDOFF_HOST_KEY: "${HANDOFF_HOST_KEY:-configured_handoff}"
      HANDOFF_HOST_TITLE: "${HANDOFF_HOST_TITLE:-人工服务}"
      HANDOFF_HOST_URL: "${HANDOFF_HOST_URL:-}"
    ports:
      # This is a service-to-service endpoint.  Do not expose the Rasa SDK's
      # Sanic CORS layer to the network; developers can still use localhost.
      - "127.0.0.1:${ACTION_SERVER_PORT:-5055}:5055"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5055/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  rasa:
    image: rasa/rasa:3.6.20-full@sha256:045b8f8f2097ef482671139838079fe94fe132e2ebd62a5808fb6cd589972c75
    command: ["run", "--enable-api", "--cors", "${RASA_CORS_ORIGIN:-http://localhost:8080}", "--port", "5005", "--model", "/app/models/tingting-v1.3.0.tar.gz"]
    environment:
      ACTION_SERVER_URL: "${ACTION_SERVER_URL:-http://action_server:5055/webhook}"
      DUCKLING_URL: "${DUCKLING_URL:-http://duckling:8000}"
      RASA_TELEMETRY_ENABLED: "false"
      RASA_TRACKER_DB_URL: "postgresql://${POSTGRES_USER:-tingting}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tingting}"
    volumes:
      - ./:/app
    ports:
      - "${RASA_PORT:-5005}:5005"
    depends_on:
      action_server:
        condition: service_healthy
      duckling:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5005/status', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-tingting}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tingting}"
      DATABASE_CONNECT_TIMEOUT_SECONDS: "${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}"
      WORKER_ENABLED: "${WORKER_ENABLED:-true}"
      WORKER_SCAN_INTERVAL_SECONDS: "${WORKER_SCAN_INTERVAL_SECONDS:-60}"
      WORKER_DUE_SOON_HOURS: "${WORKER_DUE_SOON_HOURS:-4}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      DEFAULT_TIMEZONE: "${DEFAULT_TIMEZONE:-Asia/Shanghai}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
