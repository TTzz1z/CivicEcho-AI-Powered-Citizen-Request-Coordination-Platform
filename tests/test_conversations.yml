- story: Chinese request summary denied and location corrected
  steps:
  - intent: deny
  - action: action_request_public_request_correction
  - slot_was_set:
    - correction_pending: true
  - intent: provide_information
    user: |-
      地点改成和平路小学门口
    entities:
    - location: 和平路小学门口
  - slot_was_set:
    - location: 和平路小学门口
  - action: action_apply_public_request_correction
  - action: action_prepare_request_summary

- story: Chinese active registration is cancelled
  steps:
  - intent: submit_complaint
    user: |-
      垃圾没人清理
  - action: action_start_public_request
  - slot_was_set:
    - request_type: 投诉
    - description: 垃圾没人清理
  - action: public_request_form
  - active_loop: public_request_form
  - intent: cancel_request
  - action: action_deactivate_loop
  - active_loop: null
  - action: action_reset_public_request

- story: Chinese public request status query with id
  steps:
  - intent: query_request_status
    user: |-
      查询 QT202607130001 的状态
    entities:
    - ticket_id: QT202607130001
  - slot_was_set:
    - ticket_id: QT202607130001
  - action: action_query_public_request

- story: Chinese created request is queried in the same conversation
  steps:
  - intent: submit_complaint
    user: |-
      幸福社区垃圾无人清理
    entities:
    - location: 幸福社区
  - action: action_start_public_request
  - slot_was_set:
    - request_type: 投诉
    - description: 幸福社区垃圾无人清理
    - location: 幸福社区
  - action: public_request_form
  - active_loop: public_request_form
  - active_loop: null
  - action: action_prepare_request_summary
  - slot_was_set:
    - confirmation_pending: true
  - intent: affirm
  - action: action_create_public_request
  - slot_was_set:
    - last_ticket_id: QT202607130001
  - intent: query_request_status
    user: |-
      查询刚才的工单状态
  - action: action_query_public_request

- story: Chinese status query asks for missing id then queries
  steps:
  - intent: query_request_status
    user: |-
      查一下工单状态
  - action: action_query_public_request
  - slot_was_set:
    - awaiting_ticket_id: true
  - intent: provide_information
    user: |-
      QT202607139999
    entities:
    - ticket_id: QT202607139999
  - slot_was_set:
    - ticket_id: QT202607139999
  - action: action_query_public_request

- story: Chinese unrelated input is handled
  steps:
  - intent: out_of_scope
    user: |-
      给我推荐一部电影
  - action: utter_out_of_scope
