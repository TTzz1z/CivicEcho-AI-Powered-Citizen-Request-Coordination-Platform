version: "3.0"
stories:
- story: bot challenge
  steps:
  - intent: bot_challenge
    user: |-
      Are you a bot?
  - action: utter_iamabot

- story: out of scope
  steps:
  - intent: out_of_scope
    user: |-
      I want a pizza
  - action: utter_out_of_scope

- story: open incident
  steps:
  - intent: greet
    user: |-
      hello
  - action: utter_greet
  - intent: open_incident
    user: |-
      I need to open an incident
  - action: open_incident_form
  - active_loop: open_incident_form
  - active_loop: null
  - action: action_open_incident

- story: open password reset incident
  steps:
  - intent: password_reset
    user: |-
      I'm having issues with my password
  - action: open_incident_form
  - active_loop: open_incident_form
  - active_loop: null
  - action: action_open_incident

- story: email incident
  steps:
  - intent: greet
    user: |-
      hello
  - action: utter_greet
  - intent: problem_email
    user: |-
      I have a problem with my email
  - action: open_incident_form
  - active_loop: open_incident_form
  - active_loop: null
  - action: action_open_incident

- story: interrupted
  steps:
  - intent: problem_email
    user: |-
      I have a problem with my email
  - action: open_incident_form
  - active_loop: open_incident_form
  - intent: help
  - action: utter_help
  - action: open_incident_form
  - active_loop: null
  - action: action_open_incident

- story: greet + thank
  steps:
  - intent: greet
    user: |-
      Hey there
  - action: utter_greet
  - intent: thank
    user: |-
      Awesome, thanks!
  - action: utter_welcome

- story: user requests a human handoff
  steps:
  - intent: human_handoff
    user: |-
      I want to talk to a person now
  - action: utter_ask_handoff
  - action: action_handoff_options
  - intent: deny
    user: |-
      uh no
  - action: utter_ask_whatelse

- story: User says something out of scope
  steps:
  - intent: out_of_scope
    user: |-
      Can you get me a pizza
  - action: utter_out_of_scope

- story: trigger handoff
  steps:
  - intent: human_handoff
    user: |-
      give me a human
  - action: utter_ask_handoff
  - action: action_handoff_options
  - intent: trigger_handoff
  - action: action_handoff

- story: Test fallback
  steps:
  - intent: nlu_fallback
  - action: utter_default

- story: incident status happy path 
  steps:
  - intent: greet
    user: |-
      Hey there
  - action: utter_greet
  - intent: incident_status
    user: |-
      Can you check the status of my incident
  - action: incident_status_form
  - active_loop: incident_status_form
  - active_loop: null
  - action: action_check_incident_status

- story: Chinese complaint triggers draft extraction
  steps:
  - intent: submit_complaint
    user: |-
      幸福社区的垃圾三天没人清理
    entities:
    - location: 幸福社区
  - action: action_extract_request_draft

- story: Chinese suggestion triggers draft extraction
  steps:
  - intent: submit_suggestion
    user: |-
      希望幸福路增加一个公交站
    entities:
    - location: 幸福路
  - action: action_extract_request_draft

- story: Chinese consultation triggers draft extraction
  steps:
  - intent: policy_consultation
    user: |-
      办理居住证需要什么材料
  - action: action_extract_request_draft

- story: Chinese help triggers draft extraction
  steps:
  - intent: request_help
    user: |-
      和平社区老人行动不便需要上门办理
    entities:
    - location: 和平社区
  - action: action_extract_request_draft

- story: Chinese draft extraction followed by ticket query
  steps:
  - intent: submit_complaint
    user: |-
      幸福社区垃圾无人清理
    entities:
    - location: 幸福社区
  - action: action_extract_request_draft
  - intent: query_request_status
    user: |-
      查询刚才的工单状态
  - action: action_query_public_request

- story: Chinese public request status query with id
  steps:
  - intent: query_request_status
    user: |-
      查询 QT202607130001 的状态
    entities:
    - ticket_id: QT202607130001
  - slot_was_set:
    - ticket_id: QT202607130001
  - action: action_query_public_request

- story: Chinese status query asks for missing id then queries
  steps:
  - intent: query_request_status
    user: |-
      查一下工单状态
  - action: action_query_public_request
  - slot_was_set:
    - awaiting_ticket_id: true
  - intent: provide_information
    user: |-
      QT202607139999
    entities:
    - ticket_id: QT202607139999
  - slot_was_set:
    - ticket_id: QT202607139999
  - action: action_query_public_request

- story: Chinese unrelated input is handled
  steps:
  - intent: out_of_scope
    user: |-
      给我推荐一部电影
  - action: utter_out_of_scope
