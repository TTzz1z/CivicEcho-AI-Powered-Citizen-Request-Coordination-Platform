# CI-only override for production-compose job.
# Replace heavy official ClamAV with a protocol-compatible mock so runners
# are not blocked by signature CDN pulls, while still exercising clamd client.
services:
  clamav:
    image: tingting-clamav-mock:ci
    build:
      context: .
      dockerfile: Dockerfile.clamav-mock
    volumes: !override []
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1',3310),2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
  backend:
    image: tingting-ci-backend:ci
    pull_policy: never
    environment:
      OBJECT_STORAGE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
  worker:
    image: tingting-ci-backend:ci
    pull_policy: never
  caddy:
    ports: !override
      - "8088:80"
