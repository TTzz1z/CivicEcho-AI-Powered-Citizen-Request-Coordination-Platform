version: "3.1"
nlu:
- intent: submit_suggestion
  examples: |
    - 可以按季度公布公共设施巡检与整改进度，方便居民监督
    - 希望不同补助项目的条件能做成横向对照页面
    - 办事指南最好提前列出常见退件情形和补正办法
    - 学校餐饮抽查结果可以定期向家长公开
    - 建议人流多的公共空间按距离增设分类投放点
    - 公交线路调整前能否先公开征集沿线居民意见
    - 社区服务窗口可以增加午间轮班，照顾上班族
    - 建议医院把复诊与首次就诊的流程分开说明
    - 村里的公共议事结果最好同步张贴并在线公示
    - 道路改造时可以同步规划无障碍通行路线
    - 希望教育报名材料提供一份带示例的核对清单
    - 政务大厅能否设置跨部门材料一次核验服务

- intent: submit_complaint
  examples: |
    - 材料已经按清单交过一次，窗口又临时要求全部重交
    - 物业连续多日不清运垃圾，楼道异味很重
    - 道路施工没有夜间停工，噪声影响居民休息
    - 公交车多次越站不停，向客服反映也没有处理
    - 学校收费项目没有说明依据，家长询问也不回复
    - 医院挂号窗口让老人反复排队却不给明确指引
    - 社区公示的办理时限已经超过，至今没有反馈
    - 申请材料被退回三次，每次告知的缺项都不一样

- intent: request_help
  examples: |
    - 老人独居又行动不便，想请社区协助上门认证
    - 我现在被困在积水路段，能不能联系人员来帮忙
    - 家属突然住院，我不会操作异地备案，请帮我处理
    - 孩子入学材料来不及补齐，想请工作人员指导解决
    - 残障人士无法独自到窗口，希望安排无障碍协助
    - 家里停水且有卧床病人，请协调尽快恢复供水
    - 我的证件遗失又急需就医，能帮忙说明临时办理办法吗
    - 村里老人不会使用手机缴费，请安排线下协助

- intent: policy_consultation
  examples: |
    - 不同类型的就业补贴分别要满足哪些条件
    - 证件还没到期是否允许提前申请换发
    - 已经办好的证件周末可以到大厅领取吗
    - 医保关系转移需要原参保地出具什么材料
    - 学区审核以房产地址还是实际居住地址为准
    - 门诊慢病备案后报销比例怎么计算
    - 社区养老服务的申请对象包括哪些人
    - 企业变更地址能不能全程网上办理
