version: "3.1"
rules:
  - rule: handoff intent from other bot's handoff triggers greeting
    steps:
    - intent: handoff
    - action: utter_greet

  - rule: Ask the user to rephrase whenever they send a message with low NLU confidence
    steps:
    - intent: nlu_fallback
    - action: utter_default

  - rule: answer bot challenge
    steps:
    - intent: bot_challenge
    - action: utter_iamabot

  - rule: start open incident form
    steps:
    - or:
      - intent: open_incident
      - intent: password_reset
      - intent: problem_email
    - action: open_incident_form
    - active_loop: open_incident_form

  - rule: submit open incident form
    condition:
      - active_loop: open_incident_form
    steps:
    - action: open_incident_form
    - active_loop: null
    - action: action_open_incident

  - rule: start incident status form
    steps:
    - intent: incident_status
    - action: incident_status_form
    - active_loop: incident_status_form

  - rule: submit incident status form
    condition:
      - active_loop: incident_status_form
    steps:
    - action: incident_status_form
    - active_loop: null
    - action: action_check_incident_status

  - rule: extract draft from public request intent
    steps:
    - or:
      - intent: submit_complaint
      - intent: submit_suggestion
      - intent: policy_consultation
      - intent: request_help
    - action: action_extract_request_draft

  - rule: query public request status
    steps:
    - intent: query_request_status
    - action: action_query_public_request

  - rule: query after user supplies requested ticket id
    condition:
    - slot_was_set:
      - awaiting_ticket_id: true
    steps:
    - intent: provide_information
    - action: action_query_public_request
