name: Tingting CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      run_e2e_full:
        description: "Run full three-browser Playwright suite"
        type: boolean
        default: true
      run_production_compose:
        description: "Run production-compose integration job"
        type: boolean
        default: true

permissions:
  contents: read

env:
  POSTGRES_DB: tingting_ci
  POSTGRES_USER: tingting_ci
  POSTGRES_PASSWORD: ci-only-postgres-password
  JWT_SECRET: ci-only-jwt-secret-at-least-32-characters
  SERVICE_API_TOKEN: ci-only-action-service-token
  SEED_PASSWORD: CI-Seed-Only-From-Workflow-2026!
  E2E_PASSWORD: CI-E2E-Only-From-Workflow-2026!
  RASA_TELEMETRY_ENABLED: "false"

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements-dev.txt
            backend/requirements.lock.txt
      - run: python -m pip install ruff==0.8.6
      - run: python -m compileall -q backend/app backend/tests actions channels tests
      - run: ruff check --select E9,F63,F7,F82 backend/app backend/tests actions channels tests
      - run: docker compose config -q

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint:types
      - run: npm test
      - run: npm run build

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: tingting_ci
          POSTGRES_USER: tingting_ci
          POSTGRES_PASSWORD: ci-only-postgres-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tingting_ci -d tingting_ci"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://tingting_ci:ci-only-postgres-password@localhost:5432/tingting_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: python -m pip install -r backend/requirements-dev.txt
      - working-directory: backend
        run: alembic upgrade head
      - working-directory: backend
        run: alembic check
      - working-directory: backend
        run: pytest -q

  action-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile.actions -t tingting-actions:ci .
      - run: docker run --rm --entrypoint python tingting-actions:ci -m unittest discover -s /app/tests -p "test_public_request_actions.py" -v
      - run: docker run --rm --entrypoint python tingting-actions:ci -m unittest discover -s /app/tests -p "test_ticket_gateway.py" -v

  rasa-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose run --rm --no-deps rasa data validate
      - run: docker compose run --rm --no-deps rasa test core --stories tests/test_conversations_ci.yml --model models/tingting-v1.3.0.tar.gz --fail-on-prediction-errors --out results/ci-core
      - run: docker compose run --rm --no-deps rasa test nlu --nlu tests/test_nlu.yml --model models/tingting-v1.3.0.tar.gz --out results/ci-nlu

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx playwright install --with-deps chromium
      - run: sh scripts/run-e2e.sh smoke

  e2e-full:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_e2e_full == true)
      || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx playwright install --with-deps
      - run: sh scripts/run-e2e.sh full

  dependency-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install pip-audit
      - run: pip-audit -r backend/requirements.lock.txt
      # Sanic-Cors 2.2.0 is the latest upstream release; the Action Server is
      # loopback-only while the upstream CVE remains unfixed.
      - run: pip-audit -r actions/requirements-actions.txt --ignore-vuln CVE-2026-37737
      - run: docker build -f Dockerfile.actions -t tingting-actions-security:ci .
      - run: docker run --rm --user root --entrypoint sh tingting-actions-security:ci -ec "python -m pip install --no-cache-dir pip-audit && python -m pip_audit --ignore-vuln CVE-2026-37737"
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  docker-integration:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build --wait
      - run: docker compose exec -T -e SEED_PASSWORD -e SEED_PROFILE=demo backend python -m app.seed
      - run: docker compose exec -T -e SEED_PASSWORD backend python -m scripts.verify_r4_business_loops
      - if: always()
        run: docker compose logs --no-color --tail=200 && docker compose down -v

  production-compose:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || (github.event_name == 'workflow_dispatch' && inputs.run_production_compose == true)
      || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Workflow-level env (tingting_ci / weak "password" tokens) overrides --env-file.
    # Pin production-compose secrets here so compose interpolation matches .env.prod.
    env:
      POSTGRES_DB: tingting
      POSTGRES_USER: tingting
      POSTGRES_PASSWORD: CiProdPgSecret9f3a2b7c1d4e5f60
      JWT_SECRET: ci-prod-jwt-secret-at-least-32-characters-long
      SERVICE_API_TOKEN: ci-prod-service-token-at-least-32-chars
      SEED_PASSWORD: CI-Seed-Only-From-Workflow-2026!
      MINIO_ROOT_USER: ciProdMinioUser
      MINIO_ROOT_PASSWORD: CiProdMinioSecret9f3a2b7c1d4e
      OBJECT_STORAGE_ACCESS_KEY: ciProdMinioUser
      OBJECT_STORAGE_SECRET_KEY: CiProdMinioSecret9f3a2b7c1d4e
      OBJECT_STORAGE_ENDPOINT: minio:9000
      OBJECT_STORAGE_BUCKET: tingting-attachments
      KB_UPLOAD_BUCKET: tingting-kb
      OBJECT_STORAGE_SECURE: "false"
      CORS_ORIGINS: https://localhost
      APP_ENV: production
      MALWARE_SCAN_MODE: clamd
      MALWARE_SCAN_URL: clamav:3310
      MALWARE_SCAN_REQUIRE_CLEAN: "true"
      COMPOSE_HTTP_TIMEOUT: "600"
      DOCKER_CLIENT_TIMEOUT: "600"
    steps:
      - uses: actions/checkout@v4
      - name: Write .env.prod for CI
        run: |
          printf '%s\n' \
            'JWT_SECRET=ci-prod-jwt-secret-at-least-32-characters-long' \
            'SERVICE_API_TOKEN=ci-prod-service-token-at-least-32-chars' \
            'POSTGRES_PASSWORD=CiProdPgSecret9f3a2b7c1d4e5f60' \
            'APP_ENV=production' \
            'SITE_ADDRESS=localhost' \
            'CORS_ORIGINS=https://localhost' \
            'RASA_CORS_ORIGIN=https://localhost' \
            'POSTGRES_DB=tingting' \
            'POSTGRES_USER=tingting' \
            'MINIO_ROOT_USER=ciProdMinioUser' \
            'MINIO_ROOT_PASSWORD=CiProdMinioSecret9f3a2b7c1d4e' \
            'OBJECT_STORAGE_ENDPOINT=minio:9000' \
            'OBJECT_STORAGE_ACCESS_KEY=ciProdMinioUser' \
            'OBJECT_STORAGE_SECRET_KEY=CiProdMinioSecret9f3a2b7c1d4e' \
            'OBJECT_STORAGE_BUCKET=tingting-attachments' \
            'KB_UPLOAD_BUCKET=tingting-kb' \
            'OBJECT_STORAGE_SECURE=false' \
            'MALWARE_SCAN_MODE=clamd' \
            'MALWARE_SCAN_URL=clamav:3310' \
            'MALWARE_SCAN_REQUIRE_CLEAN=true' \
            'SEED_PASSWORD=CI-Seed-Only-From-Workflow-2026!' \
            > .env.prod
      - name: Validate production compose
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod config -q
      - name: Start production compose
        run: |
          set -eux
          compose() {
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod "$@"
          }
          # Pre-build/pull outside `compose up` — a single up --build on GHA often hits
          # COMPOSE_HTTP_TIMEOUT (~5m) while pip-installing the backend image.
          docker pull pgvector/pgvector:pg16
          docker pull minio/minio:RELEASE.2025-04-22T22-12-26Z
          docker build -f Dockerfile.clamav-mock -t tingting-clamav-mock:ci .
          docker build --build-arg "CI_CACHEBUST=${GITHUB_SHA}" -f Dockerfile.backend -t tingting-ci-backend:ci .
          # Guard against stale Settings that still require OBJECT_STORAGE_SECURE=true.
          docker run --rm tingting-ci-backend:ci python -c "import inspect; from app.config import Settings; src=inspect.getsource(Settings.reject_weak_production_secrets); assert 'OBJECT_STORAGE_SECURE must be true' not in src, src; print('settings-guard-ok')"
          # Core production path only (avoid full Rasa/frontend stack flakiness on runners).
          if ! compose up -d --no-build postgres minio clamav; then
            compose ps -a || true
            compose logs --no-color --tail=200 || true
            exit 1
          fi
          infra_ready=0
          for i in $(seq 1 60); do
            # pg_isready can return 0 before the role/db exist; require a real SQL probe.
            pg_ok=$(compose exec -T postgres psql -U tingting -d tingting -tAc 'SELECT 1' >/dev/null 2>&1 && echo 1 || echo 0)
            minio_ok=$(compose exec -T minio curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 && echo 1 || echo 0)
            clam_ok=$(compose exec -T clamav python -c "import socket; s=socket.create_connection(('127.0.0.1',3310),2); s.close()" >/dev/null 2>&1 && echo 1 || echo 0)
            if [ "$pg_ok" = "1" ] && [ "$minio_ok" = "1" ] && [ "$clam_ok" = "1" ]; then
              echo "infra ready"
              infra_ready=1
              break
            fi
            sleep 3
          done
          if [ "$infra_ready" != "1" ]; then
            compose ps -a || true
            compose logs --no-color --tail=200 || true
            exit 1
          fi
          # Validate production Settings with the exact compose-injected env before detach.
          compose run --no-deps --rm backend python -c "from app.config import get_settings; s=get_settings(); print('settings-ok', s.app_env, s.object_storage_secure, s.malware_scan_mode, bool(s.object_storage_endpoint))"
          if ! compose up -d --no-build --no-deps backend worker; then
            compose ps -a || true
            compose logs --no-color --tail=200 || true
            exit 1
          fi
          # Fail fast with visible diagnostics if backend exits during boot.
          sleep 10
          compose ps -a
          {
            echo "## production-compose backend boot"
            echo '```'
            compose logs --no-color --tail=120 backend || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if ! compose ps --status running --services | grep -qx backend; then
            echo "backend is not running after boot window" >> "$GITHUB_STEP_SUMMARY"
            compose logs --no-color --tail=200 backend worker postgres || true
            exit 1
          fi
      - name: Wait for core services (postgres/minio/backend)
        run: |
          set -eux
          compose() {
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod "$@"
          }
          for i in $(seq 1 72); do
            if compose exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2)"; then
              echo "backend ready"
              exit 0
            fi
            echo "backend not ready attempt=$i"
            if [ $((i % 6)) -eq 0 ]; then
              compose ps -a || true
              compose logs --no-color --tail=80 backend worker || true
            fi
            sleep 5
          done
          {
            echo "## production-compose readiness failure"
            echo '```'
            compose ps -a || true
            compose logs --no-color --tail=200 backend worker postgres minio clamav || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
      - name: Capture compose diagnostics file
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod ps -a > production-compose-diagnostics.txt || true
          echo "===== LOGS =====" >> production-compose-diagnostics.txt
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod logs --no-color --tail=300 >> production-compose-diagnostics.txt || true
      - name: Upload compose diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-compose-diagnostics
          path: production-compose-diagnostics.txt
          if-no-files-found: ignore
      - name: Wait for ClamAV
        run: |
          set -eux
          for i in $(seq 1 36); do
            if docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod exec -T clamav python -c "import socket; s=socket.create_connection(('127.0.0.1',3310),2); s.close()"; then
              echo "clamav mock ready"
              exit 0
            fi
            echo "clamav not ready attempt=$i"
            sleep 5
          done
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod ps
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod logs --no-color --tail=120 clamav
          exit 1
      - name: Alembic head and health
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod exec -T backend alembic current
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"
      - name: Seed demo profile
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod exec -T -e SEED_PASSWORD -e SEED_PROFILE=demo backend python -m app.seed
      - name: Verify ClamAV scanner rejects EICAR
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod exec -T backend python - <<'PY'
          from datetime import datetime, timezone
          from io import BytesIO
          from app.malware_scanner import get_malware_scanner
          eicar = b"X5O!P%@AP[4\\PZX54(P^)7CC)7}$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!$H+H*"
          result = get_malware_scanner().scan(BytesIO(eicar), "eicar.txt", "text/plain")
          print({"status": result.status, "detail": result.detail, "engine": result.engine})
          assert result.status == "infected", result
          PY
      - if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod logs --no-color --tail=200 && docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ci-prod.yml --env-file .env.prod down -v
