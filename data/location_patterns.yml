version: "3.1"
nlu:
- lookup: location
  examples: |
    - 北京市
    - 上海市
    - 天津市
    - 重庆市
    - 朝阳区
    - 海淀区
    - 浦东新区
    - 余杭区
    - 天河区
    - 鼓楼区
    - 人民路
    - 建设路
    - 解放路
    - 中山路
    - 和平路
    - 幸福社区
    - 和平小区
    - 阳光小区
    - 新华村
    - 政务服务中心
    - 便民服务中心
    - 社区卫生服务中心
    - 实验小学
    - 第一中学
    - 人民医院
    - 中心医院

- regex: location
  examples: |
    - (?:我家|家里|家|小区|学校|医院|社区|村委会)(?:门口|东门|西门|南门|北门|旁边|附近|对面|前面|后面)
    - ^[\u4e00-\u9fa5]{2,6}?(?:路|街|巷|大道|公路)(?:与[\u4e00-\u9fa5]{2,6}?(?:路|街|巷|大道|公路)(?:交叉口|路口))?
    - (?<=[在到去从])[\u4e00-\u9fa5]{2,6}?(?:路|街|巷|大道|公路)(?:与[\u4e00-\u9fa5]{2,6}?(?:路|街|巷|大道|公路)(?:交叉口|路口))?
    - ^[\u4e00-\u9fa5]{2,8}?(?:小区|社区|村|镇)(?:东门|西门|南门|北门|门口|附近)?
    - (?<=[在到去从])[\u4e00-\u9fa5]{2,8}?(?:小区|社区|村|镇)(?:东门|西门|南门|北门|门口|附近)?
    - ^(?!民办|公办)[\u4e00-\u9fa5]{2,10}?(?:小学|中学|学校|医院|卫生院|服务中心|政务中心|政务大厅|公园|广场|客运站)
    - (?<=[在到去从])(?!民办|公办)[\u4e00-\u9fa5]{2,10}?(?:小学|中学|学校|医院|卫生院|服务中心|政务中心|政务大厅|公园|广场|客运站)
