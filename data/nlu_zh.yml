version: "3.1"

nlu:
- intent: submit_complaint
  examples: |
    - [小区北门](location)的[垃圾](target)已经[三天](time)没人清理了
    - [人民路](location)，有个[井盖](target)坏了，一直没人来修
    - [早高峰](time)[公交车](target)连续甩站，大家根本上不去
    - 楼下餐馆[每天半夜](time)还在吵，严重影响休息
    - [幸福家园](location)物业收了费却不维修电梯
    - [学校食堂](location)卫生太差，孩子吃完就肚子不舒服
    - [社区医院](target)窗口工作人员态度很差
    - [建设路和解放路交叉口](location)红绿灯坏了[两天](time)
    - 这条路反复开挖，刚铺好又挖开
    - [公园公厕](target)长期没有水，也没人管理
    - [昨天晚上](time)[广场](location)施工噪声一直持续到十二点
    - 物业把消防通道堵住了，反映多次也不处理
    - [三号线地铁站](location)无障碍电梯停了[一周](time)
    - [菜市场](location)门口污水横流，味道特别大
    - 我去办事被几个窗口来回推，跑了三趟还没办成
    - [和平社区](location)停水没有提前通知
    - [路边路灯](target)连续好几晚不亮，晚上很危险
    - [公交站牌](target)显示的线路信息一直是错的
    - [育才小学](target)门口车辆乱停，把路全堵了
    - [上午](time)去服务大厅，排队两小时窗口却提前关了
    - 楼上的违建施工掉东西，物业一直不管
    - [河滨步道](location)护栏松动很久了
    - 医院挂号系统反复崩溃，现场也没人解释
    - [老年活动中心](target)大门长期锁着，根本没开放
    - [本月](time)垃圾清运已经漏了好几次
    - 小区门口摊贩占道，轮椅根本过不去
    - [文化馆](target)公布开放却临时闭馆，也没有通知
    - [南湖路](location)积水齐膝，雨停一天还没排掉
    - [供暖公司](target)说温度达标，可家里一直只有十五度
    - 社区热线打了很多次都没人接
    - [体育公园](location)的健身器材生锈断裂
    - [垃圾中转站](target)清晨作业噪声特别大
    - [上周](time)提交的材料被窗口弄丢了
    - [医院急诊](location)指示牌混乱，患者来回找不到地方
    - [春风小区](location)电梯反复停运，物业一直没有彻底维修
    - [长江路](location)路面坑洼很深，已经有人摔倒
    - [中心广场](location)音响每天清晨声音过大
    - [新城社区](location)垃圾分类点长期无人清洗
    - 商场外墙灯光整夜照进居民家里，投诉多次没改善
    - 窗口把办结时间一拖再拖，也没有说明原因

- intent: submit_suggestion
  examples: |
    - 希望[这里](location)增加一个[公交站](target)
    - 建议[学校门口](location)设置限速和减速带
    - 能否在[社区大厅](location)增加老年人专用窗口
    - [滨河公园](location)最好多装几盏路灯
    - 建议把政务材料清单放到网上，免得群众白跑
    - 希望公交线路在晚高峰增加班次
    - 可以给老旧小区加装无障碍坡道
    - 建议[菜市场](location)划分临时停车区
    - 图书馆周末能不能延长开放时间
    - 希望社区定期公布物业维修资金使用情况
    - 建议医院增加自助打印检查报告的设备
    - [和平路](location)非机动车道可以重新规划一下
    - 能不能在公园里多设置一些饮水点
    - 建议办事大厅提供材料预审服务
    - 希望小学放学时安排交通疏导人员
    - 社区可以组织面向独居老人的定期探访
    - 建议垃圾分类点加上遮雨棚
    - 公交站牌最好显示车辆实时到站信息
    - 希望公共厕所增加母婴设施
    - 可以在[地铁口](location)设置共享单车电子围栏
    - 建议把常见政策做成通俗易懂的问答
    - [老年大学](target)课程名额能否适当增加
    - 希望社区卫生中心开放夜间门诊
    - 建议雨季前统一清理道路排水口
    - 公园儿童区可以铺设更安全的软质地面
    - 希望增加农村客运的早晚班次
    - 办事进度最好能通过短信主动告知
    - 建议在学校周边增设临时接送区
    - [人民广场](location)可以增加轮椅租借服务
    - 希望物业报修能公开处理时限
    - 建议社区开设青少年暑期活动室
    - 医院停车场可以增加清晰的空位指引
    - 希望[文化中心](target)多举办一些公益讲座
    - 建议在主要路口增加语音过街提示
    - 希望[青年公园](location)增加儿童洗手设施
    - 建议[复兴路](location)设置连续的自行车道
    - 政务网站可以增加适合老年人的大字版本
    - 医院预约页面最好提供更清楚的操作引导
    - 希望社区服务站增加午间值班时段
    - 建议学校门口完善雨天接送区域

- intent: policy_consultation
  examples: |
    - 办理居住证需要什么材料
    - 新生儿落户应该走什么流程
    - 申请公租房要满足哪些条件
    - 异地就医备案在哪里办理
    - 老年证可以网上申请吗
    - 个体工商户注销需要带哪些东西
    - [今年](time)小学入学报名是什么时候
    - 换领身份证要不要提前预约
    - 灵活就业人员怎么缴养老保险
    - 生育津贴应该向哪个部门申请
    - 低保申请一般多久能审批下来
    - 我想迁户口，具体要去哪里办
    - 医保关系转移能在线操作吗
    - 开办托育机构需要哪些许可
    - 购买二手房后水电过户怎么办
    - 残疾人补贴的标准是多少
    - [政务服务中心](location)周六上班吗
    - 办理护照可以使用电子照片吗
    - 失业登记之后能享受什么政策
    - 申请法律援助有收入限制吗
    - 农村宅基地确权需要提交什么证明
    - 企业社保增员的入口在哪里
    - 公积金提取多久到账
    - 孩子转学需要原学校出具什么材料
    - 门诊慢特病如何认定
    - 结婚登记能跨区办理吗
    - 房屋租赁备案是否收费
    - 城乡居民医保错过缴费期还能补吗
    - 申请加装电梯需要多少业主同意
    - 道路临时占用许可由哪个单位审批
    - 退休认证可以让家属代办吗
    - 电子营业执照在哪里下载
    - 收养登记有哪些年龄要求
    - 咨询事项没有具体发生地点
    - 养老服务补贴需要每年重新申请吗
    - 办理门牌号码证明应该准备哪些资料
    - 公租房轮候结果可以从哪里查询
    - 医疗费用手工报销有没有办理期限

- intent: request_help
  examples: |
    - 老人行动不便，能不能帮忙上门办理
    - 家里老人走失了，请帮忙联系寻找
    - 我坐轮椅，办事大厅没有坡道，能协调一下吗
    - 独居老人家里断水，不知道找谁处理
    - 孩子突发重病，家庭困难，想申请临时救助
    - 我听不懂窗口解释，能不能安排人指导办理
    - 家里漏水很严重，物业联系不上，请帮忙协调
    - 残疾证快到期了，但本人卧床不能去现场
    - 外地游客证件丢了，麻烦告诉我现在该怎么办
    - 我被困在积水路段了，请联系救援
    - 老人不会用手机，健康认证一直做不了
    - 家中没有暖气，孩子还小，能尽快帮忙看看吗
    - 我们小区电梯停运，家里病人没法下楼就医
    - 身份证丢失又急着住院，请帮我想想办法
    - 工资被拖欠，单位也联系不上，能协助处理吗
    - 我是视障人士，需要有人陪同完成窗口手续
    - 暴雨把房子淹了，目前没有地方住
    - 家里燃气突然停了，老人独自在家很着急
    - 我不会填写申请表，能安排工作人员帮一下吗
    - 小孩在外地上学，转学材料一直办不下来，请协调
    - 家属突发急病，附近找不到可用的无障碍车辆
    - [幸福社区](location)有位独居老人几天没出门，请帮忙确认情况
    - 我遇到网络诈骗，不知道先联系哪个部门
    - 租住的房屋突然断电，房东拒绝处理
