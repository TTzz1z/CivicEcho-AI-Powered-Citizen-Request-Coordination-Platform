  - action: public_request_form
  - active_loop: public_request_form
  - active_loop: null
  - action: action_prepare_request_summary
  - slot_was_set:
    - confirmation_pending: true
  - intent: affirm
  - action: action_create_public_request

- story: Chinese request asks for missing location
  steps:
  - intent: submit_complaint
    user: |-
      垃圾已经三天没人清理
  - action: action_start_public_request
  - slot_was_set:
    - request_type: 投诉
    - description: 垃圾已经三天没人清理
  - action: public_request_form
  - active_loop: public_request_form
  - intent: provide_information
    user: |-
      幸福社区
  - slot_was_set:
    - location: 幸福社区
  - action: public_request_form
  - active_loop: null
  - action: action_prepare_request_summary

- story: Chinese request does not ask for known location
  steps:
  - intent: submit_complaint
    user: |-
      人民路井盖坏了
    entities:
    - location: 人民路
  - action: action_start_public_request
  - slot_was_set:
    - request_type: 投诉
    - description: 人民路井盖坏了
    - location: 人民路
  - action: public_request_form
  - active_loop: public_request_form
  - active_loop: null
